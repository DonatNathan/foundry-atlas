name: CI

on:
  # Validate every PR that targets an integration branch (feature -> dev, dev -> main).
  pull_request:
    branches: [dev, main]
  # Also run on direct pushes to those branches (e.g. after a merge).
  push:
    branches: [dev, main]

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  server:
    name: Server — install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # No test suite yet; this verifies the server installs and resolves cleanly.
      - run: node --check index.mjs

  deploy:
    name: Deploy API to VPS
    # Only after lint/build pass, and only on a push (merge) to main.
    needs: [frontend, server]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Never let two deploys run at once; cancel an in-flight one if a newer
    # commit lands.
    concurrency:
      group: deploy-vps
      cancel-in-progress: true
    steps:
      - name: Pull, rebuild & restart the API container over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -eu
            cd "${{ secrets.VPS_PROJECT_PATH }}"
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build foundry-api
            docker image prune -f
