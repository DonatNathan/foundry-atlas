<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C2127"/>
      <stop offset="1" stop-color="#10141A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.32" r="0.55">
      <stop offset="0" stop-color="#4C90F0" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#4C90F0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- node + edge motif -->
  <g stroke="#4C90F0" stroke-opacity="0.45" stroke-width="2">
    <line x1="930" y1="180" x2="1040" y2="120"/>
    <line x1="930" y1="180" x2="1010" y2="300"/>
    <line x1="930" y1="180" x2="820" y2="250"/>
    <line x1="1010" y1="300" x2="1090" y2="420"/>
    <line x1="820" y1="250" x2="900" y2="400"/>
    <line x1="1010" y1="300" x2="900" y2="400"/>
  </g>
  <g>
    <circle cx="930" cy="180" r="26" fill="#4C90F0"/>
    <circle cx="1040" cy="120" r="14" fill="#62D96B"/>
    <circle cx="1010" cy="300" r="18" fill="#FFB366"/>
    <circle cx="820" cy="250" r="14" fill="#C99BFF"/>
    <circle cx="1090" cy="420" r="12" fill="#7AB6FF"/>
    <circle cx="900" cy="400" r="16" fill="#FF7373"/>
  </g>

  <!-- wordmark -->
  <text x="96" y="300" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="92" font-weight="700" fill="#F6F7F9">Foundry Atlas</text>
  <text x="98" y="362" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="36" font-weight="500" fill="#A7B6C2">An interactive map of Palantir Foundry</text>

  <rect x="98" y="404" width="64" height="5" rx="2.5" fill="#4C90F0"/>
  <text x="98" y="470" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#8A9BA8">Every application as a node · every relationship as a typed link</text>
</svg>
